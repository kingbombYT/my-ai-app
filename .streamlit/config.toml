[theme]
# בחרתי עבורך פלטת צבעים בסגנון "מצב כהה" מודרני ונקי (כמו של GitHub).
# זה אפור כהה מאוד, לא שחור מלא, שמרגיש הרבה יותר טוב לעין.

# צבע הרקע הראשי של האתר
backgroundColor="#161B22"

# צבע הרקע של תפריט הצד (הבמאי שלנו) - קצת יותר כהה
secondaryBackgroundColor="#0D1117"

# צבע הטקסט - אפור-לבן עדין שלא מסנוור
textColor="#C9D1D9"

# צבע ההדגשה (למשל, לכפתורים ולפסי טעינה) - כחול-אפור יפה
primaryColor="#58A6FF"

# הפונט המועדף (נעשה אותו סנס-סריף, נקי)
font="sans serif"
